<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ Nez FIFA - World Cup Predictions</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Login/Register Page -->
  <div id="authPage" class="page">
    <div class="auth-container">
      <div class="trophy-decoration">🏆</div>
      <h1 class="auth-title">NEZ FIFA</h1>
      <p class="auth-subtitle">🌍 Predict. Compete. Dominate. 🌍</p>
      <div class="auth-tabs">
        <button id="loginTab" class="auth-tab-btn active" data-tab="login">Login</button>
        <button id="registerTab" class="auth-tab-btn" data-tab="register">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="auth-form" style="display: block;">
        <input type="text" id="loginUsername" placeholder="Username" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit" class="auth-submit">Login</button>
        <p id="loginError" class="auth-error"></p>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form" style="display: none;">
        <input type="text" id="registerUsername" placeholder="Username" required />
        <input type="password" id="registerPassword" placeholder="Password" required />
        <button type="submit" class="auth-submit">Register</button>
        <p id="registerError" class="auth-error"></p>
      </form>
    </div>
  </div>

  <!-- Main App Page -->
  <div id="mainPage" class="page" style="display: none;">
    <nav class="navbar">
      <div class="nav-left">
        <div class="fifa-logo">
          <span class="trophy-infinity">🏆</span>
          <h1 class="nav-logo">NEZ FIFA</h1>
        </div>
      </div>
      <div class="nav-right">
        <button id="leaderboardBtn" class="nav-btn">🏆 Leaderboard</button>
        <button id="homeBtn" class="nav-btn">🏠 Home</button>
        <span id="userDisplay" class="user-display"></span>
        <button id="logoutBtn" class="nav-btn logout-btn">🚪 Logout</button>
      </div>
    </nav>

    <!-- Home Page (Predictions) -->
    <div id="homePage" class="content-page">
      <div id="skillIssueAlert" class="skill-issue-alert" style="display: none;"></div>

      <div class="page-shell">
        <header class="hero">
          <p class="hero-tagline">Make Your Predictions & Earn Points</p>
        </header>

        <section class="panel">
          <h2>Round of 16 Matches</h2>
          <div id="matchesList" class="matches-list"></div>
        </section>

        <section class="panel">
          <h2>Recent Predictions</h2>
          <div id="predictionsList" class="predictions-list"></div>
        </section>

        <section class="panel chat-panel">
          <h2>💬 Live Chat</h2>
          <div id="chatMessages" class="chat-messages"></div>
          <form id="chatForm" class="chat-form">
            <input type="text" id="chatInput" placeholder="Share your thoughts..." maxlength="300" />
            <button type="submit">Send</button>
          </form>
        </section>
      </div>
    </div>

    <!-- Leaderboard Page -->
    <div id="leaderboardPage" class="content-page" style="display: none;">
      <div class="page-shell">
        <header class="hero">
          <h2 class="leaderboard-title">🏆 Global Leaderboard</h2>
        </header>

        <section class="panel">
          <div id="leaderboardList" class="leaderboard-list"></div>
        </section>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
